<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel González | CEO Advan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00aaff; 
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Corregido */
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.3);
        }

        h1 { font-size: 1.6rem; margin-bottom: 5px; font-weight: 700; letter-spacing: -0.5px; }
        .tagline { color: var(--primary); font-size: 0.8rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        .bio { 
            font-size: 0.9rem; 
            line-height: 1.6; 
            margin-bottom: 35px; 
            color: #bdc3c7; 
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .links-container { display: grid; gap: 15px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
            gap: 10px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .btn-main { 
            background: var(--primary); 
            font-weight: 600; 
            border: none;
            color: #000;
        }
        
        .btn-main:hover {
            background: #fff;
            color: #000;
        }

        .social-icons {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icons a { color: white; font-size: 1.5rem; transition: 0.3s; opacity: 0.7; }
        .social-icons a:hover { color: var(--primary); opacity: 1; transform: scale(1.1); }
        
        .footer-logo { font-size: 0.65rem; margin-top: 50px; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <img src="manuelfoto.jpg" alt="Manuel González" class="profile-img">
    
    <h1>Manuel González</h1>
    <div class="tagline">Founder & CEO @ Advan</div>

    <div class="bio">
        Fundador y CEO de Advan, empresa tecnológica especializada en transformar el sector de transporte de carga en México con enfoque en innovación y alto impacto operacional.
    </div>

    <div class="links-container">
        <a href="mailto:manuelg@advanpro.com.mx" class="btn btn-main">
            <i class="fas fa-envelope"></i> Contactar por Correo
        </a>
        <a href="https://www.advanpro.com.mx" target="_blank" class="btn">
            <i class="fas fa-globe"></i> Sitio Web Oficial
        </a>
        <a href="https://www.linkedin.com/company/advanpromx/" target="_blank" class="btn">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>
    </div>

    <div class="social-icons">
        <a href="https://www.facebook.com/AdvanProMx" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://www.youtube.com/@advanpromx" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>

    <p class="footer-logo">ADVAN; 2026 | TECNOLOGIA ESPECIALIZADA</p>
</div>

</body>
</html>
